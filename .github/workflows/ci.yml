name: Verify Windows release

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    env:
      CI: "true"
      CARGO_TARGET_DIR: ${{ github.workspace }}\src-tauri\target-ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Prepare isolated local paths
        shell: pwsh
        run: |
          $isolated = Join-Path $env:RUNNER_TEMP "quotabuddy-isolated"
          $paths = @{
            QUOTABUDDY_TEST_HOME = $isolated
            CODEX_HOME = Join-Path $isolated "codex"
            APPDATA = Join-Path $isolated "appdata"
            LOCALAPPDATA = Join-Path $isolated "localappdata"
            XDG_CONFIG_HOME = Join-Path $isolated "config"
            XDG_DATA_HOME = Join-Path $isolated "data"
          }
          $paths.GetEnumerator() | ForEach-Object {
            New-Item -ItemType Directory -Force -Path $_.Value | Out-Null
            Add-Content -Path $env:GITHUB_ENV -Value "$($_.Key)=$($_.Value)"
          }

      - name: Install locked frontend dependencies
        run: npm ci

      - name: Test anonymized frontend fixtures
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Verify Rust formatting and fixture tests
        working-directory: src-tauri
        run: |
          cargo fmt --check
          cargo test
          cargo check

      - name: Build NSIS installer without running QuotaBuddy
        run: npm run release:windows

      - name: Create SHA-256 release artifact
        run: npm run release:checksums

      - name: Upload unsigned installer and checksum for review
        uses: actions/upload-artifact@v4
        with:
          name: quotabuddy-windows-nsis
          path: release/
          if-no-files-found: error

# This workflow never runs `tauri dev` or the QuotaBuddy executable. Tests use
# checked-in anonymized fixtures; no provider refresh, Codex profile, DPAPI,
# local usage log, credential, or live provider endpoint is accessed. It only
# restores declared build dependencies and builds an artifact for review.
